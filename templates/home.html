<!DOCTYPE html>
<html>
<head>
    <title>My Driving Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Welcome to My Driving App</h1>

    <!-- GPX Upload Form -->
    <div class="upload-section">
        <h2>Upload a GPX File</h2>
        <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".gpx" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <hr>

    <!-- Saved Tracks Table -->
    <h2>All Saved Tracks</h2>
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Hash</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for row in tracks %}
        <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.name }}</td>
            <td>{{ row.track_hash }}</td>
            <td>
                <a href="{{ url_for('trip_stats', track_id=row.id) }}">
                    <button type="submit">View Stats</button>
                </a>

                <form action="{{ url_for('delete_track', track_id=row.id) }}"
                      method="post"
                      style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- Total table -->
<div class = "total-table">
    <a href="{{ url_for('all_trips') }}" class="btn-primary">View All Trip</a>
</div>

</body>
</html>
